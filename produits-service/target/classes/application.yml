server:
  port: 8091
spring:
  application:
    name: produits-service
  datasource:
    url: jdbc:postgresql://postgres:5432/db_boutique
    username: user
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
  cache:
    type: redis
  data:
    redis:
      host: redis
      port: 6379
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
