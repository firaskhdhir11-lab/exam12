<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Boutique Microservices - Examen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 20px; }
        .header-panel { background: #2c3e50; color: white; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        .card { border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-panel text-center">
            <h1>🛒 Ma Boutique Microservices</h1>
            <p>Architecture : Eureka | API Gateway | Produits-Service</p>
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Liste des Produits</h2>
            <button class="btn btn-success" onclick="loadProducts()">🔄 Actualiser</button>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0 text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Désignation</th>
                            <th>Prix Unitaire</th>
                            <th>Stock</th>
                        </tr>
                    </thead>
                    <tbody id="product-table">
                        <tr><td colspan="4">Cliquez sur Actualiser...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadProducts() {
            const tableBody = document.getElementById('product-table');
            tableBody.innerHTML = '<tr><td colspan="4">Chargement en cours...</td></tr>';
            
            try {
                // On essaie d'appeler la gateway
                const response = await fetch('http://localhost:8090/api/produits');
                const produits = await response.json();
                
                tableBody.innerHTML = '';
                if (produits.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4">Aucun produit en base de données.</td></tr>';
                } else {
                    produits.forEach(p => {
                        tableBody.innerHTML += 
                            <tr>
                                <td>#\</td>
                                <td><strong>\</strong></td>
                                <td>\ €</td>
                                <td><span class="badge bg-primary">\</span></td>
                            </tr>;
                    });
                }
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="4" class="text-danger">Erreur : Vérifiez que le microservice et la Gateway sont lancés !</td></tr>';
                console.error('Erreur:', error);
            }
        }

        // Lancement auto
        window.onload = loadProducts;
    </script>
</body>
</html>
