server:
  port: 8090
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: produits-service
          uri: lb://produits-service
          predicates:
            - Path=/api/produits/**, /api/categories/**
        - id: avis-service
          uri: lb://avis-service
          predicates:
            - Path=/api/avis/**
eureka:
  client:
    service-url:
      defaultZone: http://exam-eureka-server-1:8761/eureka/
